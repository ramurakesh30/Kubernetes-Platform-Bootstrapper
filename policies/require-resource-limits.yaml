apiVersion: kyverno.io/v1

kind: ClusterPolicy

metadata:

  name: require-resource-limits

spec:

  validationFailureAction: Audit

  rules:

  - name: check-resources

    match:

      any:

      - resources:

          kinds:

          - Pod

    validate:

      message: "CPU and memory limits are required."

      pattern:

        spec:

          containers:

          - resources:

              limits:

                memory: "?*"

                cpu: "?*"