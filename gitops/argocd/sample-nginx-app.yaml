apiVersion: argoproj.io/v1alpha1

kind: Application

metadata:

  name: sample-nginx

  namespace: argocd

spec:

  project: default

  source:

    repoURL: https://github.com/ramurakesh30/kubernetes-platform-bootstrapper

    targetRevision: HEAD

    path: gitops/sample-nginx

  destination:

    server: https://kubernetes.default.svc

    namespace: default

  syncPolicy:

    automated:

      prune: true

      selfHeal: true

    syncOptions:

      - CreateNamespace=true